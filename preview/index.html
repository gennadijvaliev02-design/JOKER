<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071713" />
    <title>Joker Preview</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #071713;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .preview-loader {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .preview-loader strong {
        display: block;
        margin-bottom: 10px;
        font-size: 24px;
      }
      .preview-error {
        max-width: 560px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="preview-loader" id="preview-loader">
      <div>
        <strong>🃏 Joker Preview</strong>
        <span>Загружаю экспериментальную версию…</span>
      </div>
    </main>
    <script>
      (async () => {
        const commit = "19d806603639d854bd22bf140970b134323536ba";
        const baseUrl = `https://cdn.jsdelivr.net/gh/gennadijvaliev02-design/JOKER@${commit}/`;

        try {
          const response = await fetch(`${baseUrl}index.html`, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          let html = await response.text();
          html = html.replace("<head>", `<head><base href="${baseUrl}">`);
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          const loader = document.getElementById("preview-loader");
          loader.innerHTML = `
            <div class="preview-error">
              <strong>Не удалось загрузить Preview</strong>
              <p>${String(error)}</p>
              <p>Обнови страницу через несколько секунд.</p>
            </div>
          `;
        }
      })();
    </script>
  </body>
</html>
