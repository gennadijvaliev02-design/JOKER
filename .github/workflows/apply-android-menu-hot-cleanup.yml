name: Apply Android Menu Hot Cleanup

on:
  push:
    branches:
      - 'agent/android-menu-hot-cleanup'

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-menu-hot-cleanup
          fetch-depth: 0

      - name: Apply focused Android cleanup
        run: python3 .github/scripts/apply-android-menu-hot-cleanup.py

      - name: Validate JavaScript syntax
        run: |
          node --check difficulty-select.js
          node --check rules/rules-select.js
          node --check preload.js

      - name: Validate focused cleanup guards
        run: |
          grep -q 'PRELOAD_CONCURRENCY = 2' preload.js
          ! grep -q '\.focus' difficulty-select.js
          ! grep -q '\.focus' rules/rules-select.js
          grep -q 'setMenuOverlayOpen("game-start", true)' difficulty-select.js
          grep -q 'startScreen.classList.contains("is-hidden")' difficulty-select.js

      - name: Remove temporary patch machinery
        run: |
          rm -f .github/scripts/apply-android-menu-hot-cleanup.py
          rm -f .github/workflows/apply-android-menu-hot-cleanup.yml

      - name: Commit validated Android cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add difficulty-select.js rules/rules-select.js preload.js .github/workflows/android-apk.yml .github/scripts .github/workflows
          git commit -m 'Reduce Android menu transition work'
          git push origin HEAD:agent/android-menu-hot-cleanup
