name: Stage 4 bot end-to-end audit
on:
  pull_request:
    branches: [agent/android-script-bot-animation-sync-1]
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node tests/stage4-bot-e2e-check.js
