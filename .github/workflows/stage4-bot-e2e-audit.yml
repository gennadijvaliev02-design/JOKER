name: Stage 4 bot end-to-end audit
on:
  pull_request:
    branches: [agent/android-script-bot-animation-sync-1]
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run audit
        id: audit
        shell: bash
        run: |
          set +e
          node tests/stage4-bot-e2e-check.js > stage4-audit.log 2>&1
          status=$?
          cat stage4-audit.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: stage4-audit-log
          path: stage4-audit.log
      - name: Enforce audit result
        run: test "${{ steps.audit.outputs.status }}" = "0"
