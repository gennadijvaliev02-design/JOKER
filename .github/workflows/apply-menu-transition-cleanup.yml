name: Apply Menu Transition Cleanup

on:
  pull_request:
    branches:
      - android-menu-transition-cleanup

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: github.head_ref == 'android-menu-transition-cleanup-trigger'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout menu cleanup branch
        uses: actions/checkout@v4
        with:
          ref: android-menu-transition-cleanup
          fetch-depth: 0

      - name: Apply menu transition patch
        run: |
          PATCH=.github/patches/menu-transition-cleanup.patch
          if git apply --check "$PATCH"; then
            git apply "$PATCH"
          elif git apply --reverse --check "$PATCH"; then
            echo 'Menu transition patch is already applied.'
          else
            echo 'Menu transition patch does not match the current source.'
            exit 1
          fi

      - name: Validate optimized menu sources
        run: |
          node --check difficulty-select.js
          node --check rules/rules-engine.js
          node --check rules/rules-select.js
          node --check rules/rules-book.js
          ! grep -q 'backdrop-filter: blur' difficulty-select.css
          ! grep -q 'window.setTimeout(resolve, 220)' difficulty-select.js
          ! grep -q '}, 220);' rules/rules-select.js
          grep -q 'openMenuOverlays = new Set' difficulty-select.js
          grep -q 'if (!rulesCard.hidden) renderPage' rules/rules-book.js
          grep -q 'difficulty-select.css?v=2' index.html
          grep -q 'rules/rules-engine.js?v=9' index.html
          grep -q 'difficulty-select.js?v=5' index.html

      - name: Commit optimized menu transitions
        run: |
          if git diff --quiet; then
            echo 'No menu transition changes to commit.'
            exit 0
          fi
          git config user.name 'Joker Menu Cleanup Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add difficulty-select.css difficulty-select.js index.html \
            rules/rules-engine.js rules/rules-select.js rules/rules-book.js
          git commit -m 'Optimize Android menu transitions'
          git push origin HEAD:android-menu-transition-cleanup
