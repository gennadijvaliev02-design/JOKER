name: Export Cleanup Source

on:
  pull_request:
    branches:
      - android-app

permissions:
  contents: read

jobs:
  export-source:
    if: github.head_ref == 'android-runtime-cleanup-2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4

      - name: Pack source tree
        run: |
          zip -qr joker-cleanup-source.zip . \
            -x '.git/*' \
            -x 'node_modules/*' \
            -x 'android/*' \
            -x 'www/*'

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: JOKER-CLEANUP-SOURCE
          path: joker-cleanup-source.zip
          retention-days: 1
