name: Apply Android Runtime CSS Migration

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - agent/android-runtime-cleanup-2

permissions:
  contents: write
  pull-requests: write

jobs:
  migrate:
    if: github.event.pull_request.head.ref == 'agent/android-runtime-css-trigger'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Android cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-runtime-cleanup-2
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract runtime-injected styles
        run: python3 .github/scripts/migrate-android-runtime-css.py

      - name: Validate migrated sources
        run: |
          node --check android-runtime-v11.js
          node --check android-v14.js
          node --check android-deal-2026.js
          test -s android-runtime-v13.css
          test -s android-v14.css
          test -s android-deal-2026.css
          grep -q 'android-runtime-v13.css?v=1' android-runtime-v11.js
          grep -q 'android-v14.css?v=1' android-v14.js
          grep -q 'android-deal-2026.css?v=1' android-deal-2026.js
          ! grep -q 'String.raw' android-runtime-v11.js
          ! grep -q 'String.raw' android-v14.js
          ! grep -q 'function injectStyles' android-deal-2026.js
          ! grep -q 'style.textContent = `' android-deal-2026.js

      - name: Commit migration to Android cleanup branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-runtime-v11.js android-runtime-v13.css android-v14.js android-v14.css android-deal-2026.js android-deal-2026.css
          git commit -m "Extract Android runtime styles from JavaScript"
          git push origin HEAD:agent/android-runtime-cleanup-2
