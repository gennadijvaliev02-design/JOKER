name: Apply script.js dead-code cleanup

on:
  push:
    branches:
      - agent/android-script-dead-code-cleanup-1

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-dead-code-cleanup-1
          fetch-depth: 1

      - name: Remove confirmed dead script code
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('script.js')
          text = path.read_text(encoding='utf-8')

          blocks = [
              '''const RANK_SORT_WEIGHT = {
            A: 0,
            K: 1,
            Q: 2,
            J: 3,
            10: 4,
            9: 5,
            8: 6,
            7: 7,
            6: 8,
          };
          ''',
              '''const DEMO_BIDS = [
            [2, "pass", 3, 1],
            [3, 2, "pass", 2],
            [1, 3, 2, "pass"],
            [4, 1, 2, 3],
          ];
          ''',
              '''function formatPlayerScore(player) {
            return formatScoreEntryLabel(calculatePlayerScore(player));
          }
          
          ''',
              '''function scoreValue(player) {
            return calculatePlayerScore(player).value;
          }
          
          ''',
          ]

          for block in blocks:
              if text.count(block) != 1:
                  raise SystemExit(f'Expected exactly one block, found {text.count(block)}: {block.splitlines()[0]}')
              text = text.replace(block, '', 1)

          old_player_field = ', total: 0, order:'
          if text.count(old_player_field) != 4:
              raise SystemExit(f'Expected four legacy player.total fields, found {text.count(old_player_field)}')
          text = text.replace(old_player_field, ', order:')

          forbidden = ['RANK_SORT_WEIGHT', 'DEMO_BIDS', 'formatPlayerScore', 'scoreValue', 'player.total']
          for token in forbidden:
              if token in text:
                  raise SystemExit(f'Legacy token still present: {token}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate cleanup
        run: |
          node --check script.js
          test "$(grep -c 'total: 0, order:' script.js || true)" -eq 0
          test "$(grep -c '^function ' script.js)" -eq 160
          ! grep -q 'RANK_SORT_WEIGHT' script.js
          ! grep -q 'DEMO_BIDS' script.js
          ! grep -q 'formatPlayerScore' script.js
          ! grep -q 'scoreValue' script.js

      - name: Commit product change
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add script.js
          git diff --cached --quiet && exit 0
          git commit -m 'Remove confirmed dead code from script.js'
          git push origin HEAD:agent/android-script-dead-code-cleanup-1
