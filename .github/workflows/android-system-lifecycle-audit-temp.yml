name: Android system lifecycle audit

on:
  pull_request:
    branches:
      - agent/android-mobile-system-lifecycle-1

permissions:
  contents: write

jobs:
  verify-and-finalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-mobile-system-lifecycle-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate lifecycle adapter and late ownership
        shell: bash
        run: |
          set -euo pipefail
          node --check android-system-integration.js
          node --check android-v14.js
          ! grep -q 'setInterval' android-system-integration.js
          ! grep -q 'MutationObserver' android-system-integration.js
          grep -q 'android-system-integration.js?v=1' android-v14.js
          grep -q 'window.setTimeout' android-v14.js

          node <<'NODE'
          const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const vm = require('node:vm');

          class Emitter {
            constructor() { this.listeners = new Map(); }
            addEventListener(type, listener) {
              const listeners = this.listeners.get(type) || [];
              listeners.push(listener);
              this.listeners.set(type, listeners);
            }
            dispatchEvent(event) {
              for (const listener of this.listeners.get(event.type) || []) listener.call(this, event);
              return !event.defaultPrevented;
            }
          }

          class CustomEvent {
            constructor(type, options = {}) {
              this.type = type;
              this.detail = options.detail;
              this.defaultPrevented = false;
            }
            preventDefault() { this.defaultPrevented = true; }
          }

          let now = 1000;
          const DateMock = { now: () => (now += 100) };
          const nativeKeep = [];
          const nativeHaptics = [];
          const soundCalls = [];
          let renderCalls = 0;
          let suspendCalls = 0;
          let resumeCalls = 0;

          const audioContext = {
            state: 'running',
            suspend() { suspendCalls += 1; this.state = 'suspended'; return Promise.resolve(); },
            resume() { resumeCalls += 1; this.state = 'running'; return Promise.resolve(); },
          };
          const state = { started: false, phase: 'idle', autoPlay: false, audioContext };
          const root = { dataset: {} };
          const document = new Emitter();
          document.hidden = false;
          document.documentElement = root;
          const window = new Emitter();
          window.window = window;
          window.document = document;
          window.jokerState = state;
          window.JokerAndroid = {
            setKeepScreenOn(value) { nativeKeep.push(value); },
            haptic(type) { nativeHaptics.push(type); },
          };

          const context = {
            window,
            document,
            navigator: { vibrate: () => true },
            CustomEvent,
            Date: DateMock,
            Set,
            Object,
            Promise,
            console,
            playSound(type) { soundCalls.push(type); },
            render() { renderCalls += 1; },
          };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync('android-system-integration.js', 'utf8'), context);

          assert.equal(typeof window.JokerAndroidSystem.sync, 'function');
          assert.deepEqual(nativeKeep, [false]);

          state.started = true;
          state.phase = 'playing';
          context.render();
          assert.equal(renderCalls, 1);
          assert.deepEqual(nativeKeep, [false, true]);

          window.dispatchEvent(new CustomEvent('joker-native-lifecycle', { detail: { state: 'background' } }));
          assert.equal(suspendCalls, 1);
          assert.equal(root.dataset.androidLifecycle, 'background');
          assert.equal(nativeKeep.at(-1), false);
          context.playSound('card');
          assert.deepEqual(soundCalls, []);

          window.dispatchEvent(new CustomEvent('joker-native-lifecycle', { detail: { state: 'foreground' } }));
          assert.equal(resumeCalls, 1);
          assert.equal(root.dataset.androidLifecycle, 'foreground');
          assert.equal(nativeKeep.at(-1), true);

          context.playSound('trick');
          assert.deepEqual(soundCalls, ['trick']);
          assert.equal(nativeHaptics.at(-1), 'success');

          const enabledCard = { disabled: false, classList: { contains: () => false } };
          document.dispatchEvent({
            type: 'pointerdown',
            target: { closest: (selector) => selector === '.hand .card' ? enabledCard : null },
          });
          assert.equal(nativeHaptics.at(-1), 'selection');

          const disabledCard = { disabled: true, classList: { contains: () => true } };
          document.dispatchEvent({
            type: 'pointerdown',
            target: { closest: (selector) => selector === '.hand .card' ? disabledCard : null },
          });
          assert.equal(nativeHaptics.at(-1), 'warning');

          state.phase = 'finished';
          context.render();
          assert.equal(nativeKeep.at(-1), false);
          assert.equal(window.JokerAndroidSystem.isKeepingAwake(), false);
          console.log('Android lifecycle adapter harness passed');
          NODE

      - name: Patch generated Android shell owner
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('tools/configure_android_wrapper.py')
          source = path.read_text(encoding='utf-8')

          main_activity = r'''package com.valievcompany.joker;

          import android.content.res.Configuration;
          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.SystemClock;
          import android.view.HapticFeedbackConstants;
          import android.view.View;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import android.view.WindowManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebView;

          import androidx.activity.OnBackPressedCallback;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              private static final int APP_BACKGROUND = Color.rgb(3, 17, 15);
              private static final long HAPTIC_GAP_MS = 45L;

              private final JokerAndroidBridge jokerAndroidBridge = new JokerAndroidBridge();
              private boolean webBridgeInstalled = false;
              private volatile boolean keepScreenOnRequested = false;
              private long lastHapticAt = 0L;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  configureWindow();
                  configureWebView();
                  installBackGuard();
                  hideSystemUI();
                  getWindow().getDecorView().postDelayed(this::hideSystemUI, 250);
              }

              @Override
              public void onResume() {
                  super.onResume();
                  configureWebView();
                  applyKeepScreenOn(keepScreenOnRequested);
                  dispatchNativeLifecycle("foreground");
                  hideSystemUI();
              }

              @Override
              protected void onPause() {
                  dispatchNativeLifecycle("background");
                  applyKeepScreenOn(false);
                  super.onPause();
              }

              @Override
              protected void onPostResume() {
                  super.onPostResume();
                  hideSystemUI();
              }

              @Override
              protected void onDestroy() {
                  applyKeepScreenOn(false);
                  if (getBridge() != null && getBridge().getWebView() != null) {
                      getBridge().getWebView().removeJavascriptInterface("JokerAndroid");
                  }
                  super.onDestroy();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      hideSystemUI();
                      getWindow().getDecorView().postDelayed(this::hideSystemUI, 180);
                  }
              }

              @Override
              public void onConfigurationChanged(Configuration newConfig) {
                  super.onConfigurationChanged(newConfig);
                  hideSystemUI();
              }

              private void configureWindow() {
                  getWindow().clearFlags(WindowManager.LayoutParams.FLAG_FORCE_NOT_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setBackgroundColor(APP_BACKGROUND);
                  getWindow().setStatusBarColor(Color.TRANSPARENT);
                  getWindow().setNavigationBarColor(Color.TRANSPARENT);

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      getWindow().setStatusBarContrastEnforced(false);
                      getWindow().setNavigationBarContrastEnforced(false);
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {
                      WindowManager.LayoutParams attributes = getWindow().getAttributes();
                      attributes.layoutInDisplayCutoutMode =
                          WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES;
                      getWindow().setAttributes(attributes);
                  }

                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.R) {
                      getWindow().getDecorView().setOnSystemUiVisibilityChangeListener(
                          visibility -> {
                              if ((visibility & View.SYSTEM_UI_FLAG_FULLSCREEN) == 0) {
                                  getWindow().getDecorView().postDelayed(this::hideSystemUI, 120);
                              }
                          }
                      );
                  }
              }

              private void configureWebView() {
                  if (getBridge() == null || getBridge().getWebView() == null) {
                      return;
                  }

                  WebView webView = getBridge().getWebView();
                  webView.setBackgroundColor(APP_BACKGROUND);
                  webView.setOverScrollMode(View.OVER_SCROLL_NEVER);
                  if (!webBridgeInstalled) {
                      webView.addJavascriptInterface(jokerAndroidBridge, "JokerAndroid");
                      webBridgeInstalled = true;
                  }
              }

              private void installBackGuard() {
                  getOnBackPressedDispatcher().addCallback(this, new OnBackPressedCallback(true) {
                      @Override
                      public void handleOnBackPressed() {
                          handleAndroidBack();
                      }
                  });
              }

              private void handleAndroidBack() {
                  if (getBridge() == null || getBridge().getWebView() == null) {
                      moveTaskToBack(true);
                      return;
                  }

                  String script = "(function(){try{"
                      + "var event=new CustomEvent('joker-android-back',{cancelable:true});"
                      + "if(!window.dispatchEvent(event)){return true;}"
                      + "var sheet=document.getElementById('score-sheet');"
                      + "if(sheet&&!sheet.hidden){var close=document.getElementById('score-close');"
                      + "if(close){close.click();return true;}}"
                      + "var rules=document.getElementById('rules-card');"
                      + "if(rules&&!rules.hidden){var toggle=document.getElementById('rules-toggle');"
                      + "if(toggle){toggle.click();return true;}}"
                      + "return !!(window.jokerState&&window.jokerState.started);"
                      + "}catch(error){return false;}})()";

                  getBridge().getWebView().evaluateJavascript(script, value -> {
                      if (!"true".equals(value)) {
                          moveTaskToBack(true);
                      }
                  });
              }

              private void dispatchNativeLifecycle(String lifecycle) {
                  if (getBridge() == null || getBridge().getWebView() == null) return;

                  WebView webView = getBridge().getWebView();
                  String script = "window.dispatchEvent(new CustomEvent('joker-native-lifecycle',"
                      + "{detail:{state:'" + lifecycle + "'}}));";
                  webView.post(() -> webView.evaluateJavascript(script, null));
              }

              private void setKeepScreenOnRequested(boolean enabled) {
                  keepScreenOnRequested = enabled;
                  runOnUiThread(() -> applyKeepScreenOn(enabled));
              }

              private void applyKeepScreenOn(boolean enabled) {
                  if (enabled) {
                      getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  } else {
                      getWindow().clearFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  }
              }

              private void performHaptic(String type) {
                  runOnUiThread(() -> {
                      long now = SystemClock.uptimeMillis();
                      if (now - lastHapticAt < HAPTIC_GAP_MS) return;
                      lastHapticAt = now;

                      String safeType = type == null ? "selection" : type;
                      int feedback;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                          switch (safeType) {
                              case "success":
                              case "trick":
                                  feedback = HapticFeedbackConstants.CONFIRM;
                                  break;
                              case "warning":
                              case "error":
                                  feedback = HapticFeedbackConstants.REJECT;
                                  break;
                              default:
                                  feedback = HapticFeedbackConstants.CLOCK_TICK;
                                  break;
                          }
                      } else if ("warning".equals(safeType) || "error".equals(safeType)) {
                          feedback = HapticFeedbackConstants.LONG_PRESS;
                      } else {
                          feedback = HapticFeedbackConstants.VIRTUAL_KEY;
                      }

                      View target = getBridge() != null && getBridge().getWebView() != null
                          ? getBridge().getWebView()
                          : getWindow().getDecorView();
                      target.performHapticFeedback(feedback);
                  });
              }

              private void hideSystemUI() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      getWindow().setDecorFitsSystemWindows(false);
                      WindowInsetsController controller = getWindow().getInsetsController();
                      if (controller != null) {
                          controller.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          controller.setSystemBarsBehavior(
                              WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
                          );
                      }
                      return;
                  }

                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );
              }

              private final class JokerAndroidBridge {
                  @JavascriptInterface
                  public void setKeepScreenOn(boolean enabled) {
                      setKeepScreenOnRequested(enabled);
                  }

                  @JavascriptInterface
                  public void haptic(String type) {
                      performHaptic(type);
                  }
              }
          }
          '''
          main_activity = '\n'.join(line[10:] if line.startswith('          ') else line for line in main_activity.splitlines())

          pattern = re.compile(r"MAIN_ACTIVITY = r'''.*?'''\n\n\ndef android_attr", re.S)
          replacement = "MAIN_ACTIVITY = r'''" + main_activity + "\n'''\n\n\ndef android_attr"
          source, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected one MAIN_ACTIVITY template, replaced {count}')

          old_marker = '            "BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE",\n        ):'
          new_marker = (
              '            "BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE",\n'
              '            "addJavascriptInterface(jokerAndroidBridge, \\\"JokerAndroid\\\")",\n'
              '            "joker-native-lifecycle",\n'
              '            "FLAG_KEEP_SCREEN_ON",\n'
              '            "HapticFeedbackConstants.CONFIRM",\n'
              '            "@JavascriptInterface",\n'
              '        ):'
          )
          if old_marker not in source:
              raise SystemExit('Self-test marker block changed unexpectedly')
          source = source.replace(old_marker, new_marker, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Validate configurator and compile native shell without APK
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile tools/configure_android_wrapper.py
          python3 tools/configure_android_wrapper.py --self-test
          npm install --package-lock=false --no-audit --no-fund
          rm -rf www android
          mkdir -p www
          rsync -a --prune-empty-dirs ./ www/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'android/' \
            --exclude 'www/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'capacitor.config.json' \
            --exclude '*.md' \
            --exclude '*.txt' \
            --exclude '*.log'
          npx cap add android
          npx cap sync android
          python3 tools/configure_android_wrapper.py
          grep -q 'addJavascriptInterface(jokerAndroidBridge, "JokerAndroid")' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'FLAG_KEEP_SCREEN_ON' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'joker-native-lifecycle' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'HapticFeedbackConstants.CONFIRM' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          chmod +x android/gradlew
          cd android
          ./gradlew compileDebugJavaWithJavac

      - name: Commit verified native configurator
        shell: bash
        run: |
          set -euo pipefail
          rm -rf android www node_modules package-lock.json tools/__pycache__
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/configure_android_wrapper.py
          if git diff --cached --quiet; then
            echo 'No configurator change to commit'
            exit 0
          fi
          git commit -m 'Integrate Android lifecycle system bridge'
          git push origin HEAD:agent/android-mobile-system-lifecycle-1
