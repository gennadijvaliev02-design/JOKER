name: Android system lifecycle audit

on:
  pull_request:
    branches:
      - agent/android-mobile-system-lifecycle-1

permissions:
  contents: write

jobs:
  verify-and-finalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout product branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-mobile-system-lifecycle-1

      - name: Checkout temporary audit helpers
        uses: actions/checkout@v4
        with:
          ref: agent/android-mobile-system-lifecycle-1-audit
          path: audit-tools

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate lifecycle adapter and late ownership
        shell: bash
        run: |
          set -euo pipefail
          node --check android-system-integration.js
          node --check android-v14.js
          ! grep -q 'setInterval' android-system-integration.js
          ! grep -q 'MutationObserver' android-system-integration.js
          grep -q 'android-system-integration.js?v=1' android-v14.js
          grep -q 'window.setTimeout' android-v14.js
          node audit-tools/tools/android_system_lifecycle_harness_temp.js

      - name: Patch generated Android shell owner
        shell: bash
        run: |
          set -euo pipefail
          python3 audit-tools/tools/patch_android_lifecycle_temp.py --root .
          sed -i 's/protected void onPause()/public void onPause()/' tools/configure_android_wrapper.py
          sed -i 's/protected void onDestroy()/public void onDestroy()/' tools/configure_android_wrapper.py

      - name: Validate wrapper configurator
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile tools/configure_android_wrapper.py
          python3 tools/configure_android_wrapper.py --self-test

      - name: Generate native shell without APK
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock=false --no-audit --no-fund
          rm -rf www android
          mkdir -p www
          rsync -a --prune-empty-dirs ./ www/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'audit-tools/' \
            --exclude 'node_modules/' \
            --exclude 'android/' \
            --exclude 'www/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'capacitor.config.json' \
            --exclude '*.md' \
            --exclude '*.txt' \
            --exclude '*.log'
          npx cap add android
          npx cap sync android
          python3 tools/configure_android_wrapper.py
          grep -q 'addJavascriptInterface(jokerAndroidBridge, "JokerAndroid")' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'FLAG_KEEP_SCREEN_ON' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'joker-native-lifecycle' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'HapticFeedbackConstants.CONFIRM' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'public void onPause()' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          grep -q 'public void onDestroy()' android/app/src/main/java/com/valievcompany/joker/MainActivity.java
          chmod +x android/gradlew

      - name: Compile native shell and capture log
        shell: bash
        run: |
          set +e
          cd android
          ./gradlew compileDebugJavaWithJavac --stacktrace > ../gradle-compile.log 2>&1
          status=$?
          cd ..
          printf '%s\n' "$status" > gradle-compile.status
          tail -n 180 gradle-compile.log
          exit 0

      - name: Upload compile diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: android-lifecycle-compile-diagnostics
          path: |
            gradle-compile.log
            gradle-compile.status
          if-no-files-found: error
          retention-days: 1

      - name: Require native compile success
        shell: bash
        run: test "$(cat gradle-compile.status)" = "0"

      - name: Commit verified native configurator
        shell: bash
        run: |
          set -euo pipefail
          rm -rf android www node_modules package-lock.json tools/__pycache__ audit-tools
          rm -f gradle-compile.log gradle-compile.status
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/configure_android_wrapper.py
          if git diff --cached --quiet; then
            echo 'No configurator change to commit'
            exit 0
          fi
          git commit -m 'Integrate Android lifecycle system bridge'
          git push origin HEAD:agent/android-mobile-system-lifecycle-1
