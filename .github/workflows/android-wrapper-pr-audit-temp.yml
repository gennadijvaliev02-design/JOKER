name: Android wrapper PR audit

on:
  pull_request:
    branches:
      - agent/android-mobile-wrapper-integration-1

permissions:
  contents: read

jobs:
  export-verified-workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Android integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/android-mobile-wrapper-integration-1

      - name: Patch permanent Android workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('.github/workflows/android-apk.yml')
          workflow = path.read_text(encoding='utf-8')

          pr_trigger = "  pull_request:\n    branches:\n      - 'agent/android-*'\n"
          if pr_trigger not in workflow:
              workflow = workflow.replace(
                  'on:\n  workflow_dispatch:\n',
                  'on:\n  workflow_dispatch:\n' + pr_trigger,
                  1,
              )

          self_test = (
              '      - name: Validate Android wrapper configurator\n'
              '        run: python3 tools/configure_android_wrapper.py --self-test\n\n'
          )
          if self_test not in workflow:
              workflow = workflow.replace(
                  '      - name: Validate all JavaScript sources\n',
                  self_test + '      - name: Validate all JavaScript sources\n',
                  1,
              )

          pattern = re.compile(
              r'      - name: Configure true immersive landscape app\n'
              r'        run: \|\n.*?'
              r'(?=\n      - name: Build debug APK)',
              re.S,
          )
          replacement = (
              '      - name: Configure true immersive landscape app\n'
              '        run: python3 tools/configure_android_wrapper.py\n'
          )
          workflow, count = pattern.subn(replacement, workflow, count=1)
          if count != 1:
              raise SystemExit(f'Expected one native configuration block, replaced {count}')

          path.write_text(workflow, encoding='utf-8')
          PY

      - name: Upload verified workflow
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-workflow-patch
          path: .github/workflows/android-apk.yml
          if-no-files-found: error
          retention-days: 1
