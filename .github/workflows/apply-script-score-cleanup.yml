name: Apply script score cleanup

on:
  pull_request:
    branches:
      - agent/android-script-repeated-work-cleanup-1
  push:
    branches:
      - agent/android-script-score-cleanup-1

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-score-cleanup-1
          fetch-depth: 1

      - name: Apply exact score cleanup
        run: |
          python3 .github/tmp/score-cleanup-core1.py
          python3 .github/tmp/score-cleanup-core2.py
          python3 .github/tmp/score-cleanup-extensions.py

      - name: Validate syntax and score parity
        run: |
          node --check script.js
          node --check pulka-summary.js
          node --check pass-premium-cross-fix.js
          node --check winner-podium.js
          python3 .github/tmp/score-cleanup-parity.py
          grep -q 'function calculateCurrentPlayerScores' script.js
          grep -q 'function calculateMatchTotals' script.js
          grep -q 'function calculatePulkaTotals' script.js
          grep -q 'const playerScores = calculateCurrentPlayerScores();' pulka-summary.js
          grep -q 'const matchTotals = calculateMatchTotals();' winner-podium.js
          ! grep -q 'flatMap' pass-premium-cross-fix.js
          ! grep -q 'calculateMatchTotal(player.id)' pulka-summary.js
          ! grep -q 'calculatePulkaTotal(player.id' pulka-summary.js

      - name: Commit product change
        if: github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add script.js pulka-summary.js pass-premium-cross-fix.js winner-podium.js
          git diff --cached --quiet && exit 0
          git commit -m 'Reuse score snapshots and batch notebook totals'
          git push origin HEAD:agent/android-script-score-cleanup-1
