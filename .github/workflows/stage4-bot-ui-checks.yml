name: Stage 4 bot UI adapter checks

on:
  pull_request:
    branches:
      - agent/android-script-bot-stale-guard-1
  push:
    branches:
      - agent/android-script-bot-ui-state-1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          find . -path './node_modules' -prune -o -path './android' -prune -o -path './www' -prune -o -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run bot UI adapter checks
        run: node tests/stage4-bot-ui-adapter.test.js
