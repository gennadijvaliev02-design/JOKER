name: Diagnose script DOM cache cleanup

on:
  pull_request:
    branches:
      - agent/android-script-score-cleanup-1

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-dom-cache-cleanup-1
          fetch-depth: 1

      - name: Collect render ownership diagnostics
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = []
          for symbol in ('renderPlayers', 'renderOpponentCardStacks'):
              lines.append(f'[{symbol}]')
              for path in sorted(Path('.').rglob('*.js')):
                  source = path.read_text(encoding='utf-8')
                  for number, line in enumerate(source.splitlines(), 1):
                      if re.search(rf'\b{symbol}\s*=', line):
                          lines.append(f'{path}:{number}: {line.strip()}')

          script = Path('script.js').read_text(encoding='utf-8')
          android = Path('android-opponent-hands.js').read_text(encoding='utf-8')
          lines.extend([
              '[markers]',
              f'elements={script.count(chr(32) * 2 + "gameDialogActions: document.querySelector(\"#game-dialog-actions\")," + chr(10) + "};")}',
              f'renderPlayers={script.count("function renderPlayers() {")}',
              f'renderOpponentCardStacks={script.count("function renderOpponentCardStacks() {")}',
              f'avatarLookup={script.count("const avatar = document.querySelector(`[data-seat=\"${player.seat}\"]`);")}',
              f'stackLookup={script.count("const stack = document.querySelector(`.${seat}-stack`);")}',
              f'androidStacks={android.count("  const stacksBySeat = Object.fromEntries(")}',
          ])
          Path('dom-cache-diagnostics.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: dom-cache-diagnostics
          path: dom-cache-diagnostics.txt
