name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Validate Android JavaScript layers
        run: |
          node --check android-opponent-hands.js
          node --check android-runtime-v2.js
          node --check android-deal-v3.js

      - name: Install Capacitor dependencies
        run: npm install

      - name: Prepare web files
        run: |
          rm -rf www
          mkdir -p www
          rsync -a ./ www/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'android/' \
            --exclude 'www/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'capacitor.config.json'

          # Android-only cache busting and full edge-to-edge viewport.
          sed -i 's/web-table-polish.css?v=4/web-table-polish.css?v=11/' www/index.html
          sed -i 's/game-emotions.js?v=2/game-emotions.js?v=3/' www/index.html
          sed -i 's/width=device-width, initial-scale=1.0/width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0/' www/index.html

          # Consolidated Android-only table, composition, motion and fullscreen layers.
          sed -i 's#</head>#    <link rel="stylesheet" href="android-table-v2.css?v=2" />\n    <link rel="stylesheet" href="android-ui-v4.css?v=1" />\n    <link rel="stylesheet" href="android-ui-v5.css?v=1" />\n    <link rel="stylesheet" href="android-ui-v6.css?v=1" />\n    <link rel="stylesheet" href="android-ui-v7.css?v=1" />\n    <link rel="stylesheet" href="android-motion-v2.css?v=1" />\n    <link rel="stylesheet" href="android-fullscreen.css?v=1" />\n    <link rel="stylesheet" href="android-ui-v8.css?v=1" />\n  </head>#' www/index.html
          sed -i 's#</body>#    <script src="android-opponent-hands.js?v=2"></script>\n    <script src="android-menu-motion.js?v=1"></script>\n    <script src="android-runtime-polish.js?v=1"></script>\n    <script src="android-runtime-v2.js?v=1"></script>\n    <script src="android-deal-v3.js?v=1"></script>\n  </body>#' www/index.html

          grep -q 'android-ui-v8.css' www/index.html
          grep -q 'android-runtime-v2.js' www/index.html
          grep -q 'android-deal-v3.js' www/index.html

      - name: Create Android project
        run: npx cap add android

      - name: Sync web app to Android
        run: npx cap sync android

      - name: Configure true immersive landscape app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          manifest_path = Path('android/app/src/main/AndroidManifest.xml')
          manifest = manifest_path.read_text(encoding='utf-8')
          activity_marker = 'android:name=".MainActivity"'
          if 'android:screenOrientation=' not in manifest:
              manifest = manifest.replace(
                  activity_marker,
                  activity_marker + '\n            android:screenOrientation="sensorLandscape"',
                  1,
              )
          manifest_path.write_text(manifest, encoding='utf-8')

          # Make the native theme draw behind status/navigation bars and cutouts.
          styles_path = Path('android/app/src/main/res/values/styles.xml')
          tree = ET.parse(styles_path)
          root = tree.getroot()
          fullscreen_items = {
              'android:windowFullscreen': 'true',
              'android:windowNoTitle': 'true',
              'android:windowActionModeOverlay': 'true',
              'android:windowDrawsSystemBarBackgrounds': 'true',
              'android:statusBarColor': '@android:color/transparent',
              'android:navigationBarColor': '@android:color/transparent',
              'android:windowLightStatusBar': 'false',
              'android:windowLightNavigationBar': 'false',
              'android:windowLayoutInDisplayCutoutMode': 'shortEdges',
              'android:windowDisablePreview': 'true',
          }

          for style in root.findall('style'):
              if style.attrib.get('name') not in {'AppTheme.NoActionBar', 'AppTheme.NoActionBarLaunch'}:
                  continue
              existing = {item.attrib.get('name'): item for item in style.findall('item')}
              for item_name, item_value in fullscreen_items.items():
                  item = existing.get(item_name)
                  if item is None:
                      item = ET.SubElement(style, 'item', {'name': item_name})
                  item.text = item_value

          tree.write(styles_path, encoding='utf-8', xml_declaration=True)

          java_path = Path('android/app/src/main/java/com/valievcompany/joker/MainActivity.java')
          java_path.parent.mkdir(parents=True, exist_ok=True)
          java_path.write_text('''package com.valievcompany.joker;

          import android.content.res.Configuration;
          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowInsets;
          import android.view.WindowInsetsController;
          import android.view.WindowManager;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  configureWindow();
                  hideSystemUI();
                  getWindow().getDecorView().postDelayed(this::hideSystemUI, 250);
              }

              @Override
              public void onResume() {
                  super.onResume();
                  hideSystemUI();
              }

              @Override
              protected void onPostResume() {
                  super.onPostResume();
                  hideSystemUI();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      hideSystemUI();
                      getWindow().getDecorView().postDelayed(this::hideSystemUI, 180);
                  }
              }

              @Override
              public void onConfigurationChanged(Configuration newConfig) {
                  super.onConfigurationChanged(newConfig);
                  hideSystemUI();
              }

              private void configureWindow() {
                  getWindow().clearFlags(WindowManager.LayoutParams.FLAG_FORCE_NOT_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().setStatusBarColor(Color.TRANSPARENT);
                  getWindow().setNavigationBarColor(Color.TRANSPARENT);

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      getWindow().setStatusBarContrastEnforced(false);
                      getWindow().setNavigationBarContrastEnforced(false);
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {
                      WindowManager.LayoutParams attributes = getWindow().getAttributes();
                      attributes.layoutInDisplayCutoutMode =
                          WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES;
                      getWindow().setAttributes(attributes);
                  }

                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.R) {
                      getWindow().getDecorView().setOnSystemUiVisibilityChangeListener(
                          visibility -> {
                              if ((visibility & View.SYSTEM_UI_FLAG_FULLSCREEN) == 0) {
                                  getWindow().getDecorView().postDelayed(this::hideSystemUI, 120);
                              }
                          }
                      );
                  }
              }

              private void hideSystemUI() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      getWindow().setDecorFitsSystemWindows(false);
                      WindowInsetsController controller = getWindow().getInsetsController();
                      if (controller != null) {
                          controller.hide(WindowInsets.Type.statusBars() | WindowInsets.Type.navigationBars());
                          controller.setSystemBarsBehavior(
                              WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
                          );
                      }
                      return;
                  }

                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );
              }
          }
          ''', encoding='utf-8')
          PY

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JOKER-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
