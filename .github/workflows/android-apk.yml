name: Diagnose script DOM cache cleanup

on:
  pull_request:
    branches:
      - agent/android-script-score-cleanup-1

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-dom-cache-cleanup-1
          fetch-depth: 1

      - name: Confirm renderPlayers has no external owner
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          owners = []
          for path in Path('.').rglob('*.js'):
              if path.name == 'script.js':
                  continue
              if re.search(r'\brenderPlayers\s*=', path.read_text(encoding='utf-8')):
                  owners.append(str(path))
          assert owners == [], owners
          PY

      - name: Confirm opponent stack owner
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          owners = []
          for path in Path('.').rglob('*.js'):
              if path.name == 'script.js':
                  continue
              if re.search(r'\brenderOpponentCardStacks\s*=', path.read_text(encoding='utf-8')):
                  owners.append(str(path))
          assert owners == ['android-opponent-hands.js'], owners
          PY

      - name: Confirm elements insertion marker
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('script.js').read_text(encoding='utf-8')
          marker = '  gameDialogActions: document.querySelector("#game-dialog-actions"),\n};'
          assert source.count(marker) == 1, source.count(marker)
          PY

      - name: Confirm base render function markers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('script.js').read_text(encoding='utf-8')
          assert source.count('function renderPlayers() {') == 1
          assert source.count('function renderOpponentCardStacks() {') == 1
          assert source.count('const avatar = document.querySelector(`[data-seat="${player.seat}"]`);') == 1
          assert source.count('const stack = document.querySelector(`.${seat}-stack`);') == 1
          PY

      - name: Confirm Android stack marker
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('android-opponent-hands.js').read_text(encoding='utf-8')
          assert source.count('  const stacksBySeat = Object.fromEntries(') == 1
          PY
