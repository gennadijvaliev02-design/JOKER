name: Apply HUD emotion cleanup

on:
  push:
    branches:
      - agent/android-script-hud-emotion-cleanup-1

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-hud-emotion-cleanup-1
          fetch-depth: 0

      - name: Apply exact HUD and emotion cleanup
        run: python3 tools/apply_hud_emotion_cleanup.py

      - name: Validate syntax and behavior parity
        run: |
          node --check script.js
          node --check android-runtime-v2.js
          node --check game-emotions.js
          node --check table-language.js
          node tools/test_hud_emotion_cleanup.js
          grep -q 'function getHudRenderState' script.js
          grep -q 'typeof getHudRenderState === "function"' android-runtime-v2.js
          grep -q 'emotionIconTemplatesById' game-emotions.js
          grep -q 'lastNoticeTranslation' table-language.js

      - name: Commit product files and restore workflow
        run: |
          git fetch origin agent/android-script-bidding-cache-1
          git show origin/agent/android-script-bidding-cache-1:.github/workflows/android-apk.yml > .github/workflows/android-apk.yml
          rm -f .github/workflows/hud-emotion-audit.yml
          rm -f tools/apply_hud_emotion_cleanup.py tools/test_hud_emotion_cleanup.js
          git add -A
          git config user.name "Joker Audit Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Cache HUD notices and emotion UI"
          git push origin HEAD:agent/android-script-hud-emotion-cleanup-1
