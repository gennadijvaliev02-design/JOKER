name: Apply bidding render cache

on:
  push:
    branches:
      - agent/android-script-bidding-cache-1

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-bidding-cache-1
          fetch-depth: 0

      - name: Apply exact bidding cache cleanup
        run: python3 .github/tmp/bidding-cache-patch.py

      - name: Validate syntax and behavior parity
        run: |
          node --check script.js
          node --check rules/rules-hand-size-adapter.js
          node --check android-joker-v10.js
          node --check android-v12.js
          node .github/tmp/bidding-cache-test.js
          grep -q 'const bidPanelNodesByKey = new Map' script.js
          grep -q 'getCachedBidPanelNodes(`rules-order:${handSize}`' rules/rules-hand-size-adapter.js
          grep -q 'getCachedBidPanelNodes("android-joker-suit"' android-joker-v10.js
          grep -q 'const rulesId = window.JokerRules?.activeId' android-v12.js

      - name: Commit product change and restore repository workflow
        run: |
          git fetch origin agent/android-script-card-render-cache-1
          git show origin/agent/android-script-card-render-cache-1:.github/workflows/android-apk.yml > .github/workflows/android-apk.yml
          rm -f .github/tmp/bidding-cache-patch.py
          rm -f .github/tmp/bidding-cache-test.js
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Cache bidding and joker choice panel nodes'
          git push origin HEAD:agent/android-script-bidding-cache-1
