name: Audit card render owners

on:
  pull_request:
    branches:
      - agent/android-script-dom-cache-cleanup-1
  push:
    branches:
      - agent/android-script-card-render-cache-1

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-card-render-cache-1
          fetch-depth: 1
      - name: Collect render ownership
        run: python3 .github/tmp/card-render-owner-audit.py
      - uses: actions/upload-artifact@v4
        with:
          name: card-render-owner-audit
          path: card-render-owner-audit.txt
