name: Apply script DOM cache cleanup

on:
  pull_request:
    branches:
      - agent/android-script-score-cleanup-1

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-dom-cache-cleanup-1
          fetch-depth: 0

      - name: Apply exact shared DOM cache cleanup
        run: python3 .github/tmp/dom-cache-patch.py

      - name: Validate syntax and behavior parity
        run: |
          node --check script.js
          node --check android-runtime-polish.js
          node --check android-opponent-hands.js
          node .github/tmp/dom-cache-test.js
          grep -q 'const playerViewsBySeat' script.js
          grep -q 'const lastPlayerRenderSignatures' script.js
          grep -q 'const opponentStacksBySeat' script.js
          grep -q 'stack.children.length === cardCount' script.js
          grep -q 'typeof playerViewsBySeat === "object"' android-runtime-polish.js
          grep -q 'typeof setElementText === "function"' android-runtime-polish.js
          grep -q 'typeof opponentStacksBySeat === "object"' android-opponent-hands.js
          python3 - <<'PY'
          from pathlib import Path
          script = Path('script.js').read_text(encoding='utf-8')
          runtime = Path('android-runtime-polish.js').read_text(encoding='utf-8')
          opponents = Path('android-opponent-hands.js').read_text(encoding='utf-8')
          assert script.count('const playerViewsBySeat') == 1
          assert script.count('const opponentStacksBySeat') == 1
          assert 'const avatar = document.querySelector(`[data-seat="${player.seat}"]`);' not in script
          assert 'const stack = document.querySelector(`.${seat}-stack`);' not in script
          assert runtime.count('typeof playerViewsBySeat === "object"') == 1
          assert opponents.count('typeof opponentStacksBySeat === "object"') == 1
          PY

      - name: Commit product change and restore repository workflow
        run: |
          git fetch origin agent/android-script-score-cleanup-1
          git show origin/agent/android-script-score-cleanup-1:.github/workflows/android-apk.yml > .github/workflows/android-apk.yml
          rm -f .github/workflows/apply-script-dom-cache-cleanup.yml
          rm -f .github/tmp/dom-cache-patch.py
          rm -f .github/tmp/dom-cache-test.js
          rm -f TRIGGER_DOM_CACHE_CLEANUP.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Cache stable player and opponent DOM references'
          git push origin HEAD:agent/android-script-dom-cache-cleanup-1
