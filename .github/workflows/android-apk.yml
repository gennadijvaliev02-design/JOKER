name: Audit bidding render owners

on:
  pull_request:
    branches:
      - agent/android-script-card-render-cache-1

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-bidding-cache-1
          fetch-depth: 1

      - name: Collect bidding render ownership
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          symbols = (
              'renderBidding',
              'renderTrumpSelection',
              'renderJokerModeSelection',
              'renderLeadJokerCommandSelection',
              'renderLeadJokerSuitSelection',
          )
          lines = []
          for symbol in symbols:
              lines.append(f'[{symbol}]')
              pattern = re.compile(rf'\b(?:function\s+{symbol}\s*\(|{symbol}\s*=)')
              for path in sorted(Path('.').rglob('*.js')):
                  if any(part in {'.git', 'node_modules', 'www', 'android'} for part in path.parts):
                      continue
                  source = path.read_text(encoding='utf-8')
                  for number, line in enumerate(source.splitlines(), 1):
                      if pattern.search(line):
                          lines.append(f'{path}:{number}: {line.strip()}')

          lines.append('[bidOptions.replaceChildren]')
          for path in sorted(Path('.').rglob('*.js')):
              if any(part in {'.git', 'node_modules', 'www', 'android'} for part in path.parts):
                  continue
              source = path.read_text(encoding='utf-8')
              for number, line in enumerate(source.splitlines(), 1):
                  if 'bidOptions.replaceChildren' in line:
                      lines.append(f'{path}:{number}: {line.strip()}')

          Path('bidding-render-audit.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: bidding-render-audit
          path: bidding-render-audit.txt
