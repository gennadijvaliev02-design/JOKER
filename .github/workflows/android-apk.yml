name: Diagnose script DOM cache cleanup

on:
  pull_request:
    branches:
      - agent/android-script-score-cleanup-1

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-script-dom-cache-cleanup-1
          fetch-depth: 1
      - name: Print render owners and patch markers
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          owners_players = []
          owners_stacks = []
          for path in Path('.').rglob('*.js'):
              source = path.read_text(encoding='utf-8')
              if path.name != 'script.js' and re.search(r'\brenderPlayers\s*=', source):
                  owners_players.append(str(path))
              if path.name != 'script.js' and re.search(r'\brenderOpponentCardStacks\s*=', source):
                  owners_stacks.append(str(path))
          script = Path('script.js').read_text(encoding='utf-8')
          android = Path('android-opponent-hands.js').read_text(encoding='utf-8')
          print('renderPlayers owners:', owners_players)
          print('renderOpponentCardStacks owners:', owners_stacks)
          print('elements marker:', script.count('  gameDialogActions: document.querySelector("#game-dialog-actions"),\n};'))
          print('renderPlayers marker:', script.count('function renderPlayers() {'))
          print('base stack marker:', script.count('function renderOpponentCardStacks() {'))
          print('android stack block:', android.count('  const stacksBySeat = Object.fromEntries('))
          PY
